name: Backend Smoke

on:
  workflow_run:
    workflows:
      - Supabase Deploy
    types:
      - completed
  workflow_dispatch:

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      INTERNAL_FUNCTION_SECRET: ${{ secrets.INTERNAL_FUNCTION_SECRET }}

    steps:
      - name: Basic auth health check
        run: |
          set -euo pipefail
          status=$(curl -sS -o /tmp/auth-health.txt -w "%{http_code}" \
            "https://${PROJECT_REF}.supabase.co/auth/v1/health" \
            -H "apikey: ${PUBLISHABLE_KEY}")
          echo "auth/v1/health => HTTP $status"
          cat /tmp/auth-health.txt || true
          if [ "$status" -ge 300 ]; then
            exit 1
          fi

      - name: Verify protected functions reject anonymous requests
        run: |
          set -euo pipefail

          check_unauthorized() {
            local fn="$1"
            local body="$2"
            local status

            status=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -X POST "https://${PROJECT_REF}.supabase.co/functions/v1/${fn}" \
              -H "Content-Type: application/json" \
              -d "$body")

            echo "${fn} (anonymous) => HTTP ${status}"
            cat /tmp/resp.json || true

            if [ "$status" != "401" ] && [ "$status" != "403" ]; then
              echo "Expected ${fn} to reject anonymous access" >&2
              exit 1
            fi
          }

          check_unauthorized "mentor-chat" '{"message":"hi","mentorName":"Eli","mentorTone":"supportive"}'
          check_unauthorized "generate-daily-plan" '{"energyLevel":"medium","dayType":"workday","focusArea":"progress"}'
          check_unauthorized "verify-admin-access" '{}'
          check_unauthorized "notifications-enqueue-v2" '{}'
          check_unauthorized "notifications-dispatch-v2" '{}'

      - name: Verify internal scheduled endpoint executes
        run: |
          set -euo pipefail
          check_internal_function() {
            local fn="$1"
            local body="$2"
            local expected_mode="${3:-}"
            local status

            status=$(curl -sS -o /tmp/scheduled.json -w "%{http_code}" \
              -X POST "https://${PROJECT_REF}.supabase.co/functions/v1/${fn}" \
              -H "apikey: ${PUBLISHABLE_KEY}" \
              -H "x-internal-key: ${INTERNAL_FUNCTION_SECRET}" \
              -H "Content-Type: application/json" \
              -d "$body")

            echo "${fn} (internal) => HTTP ${status}"
            cat /tmp/scheduled.json || true

            if [ "$status" -ge 300 ]; then
              exit 1
            fi

            if [ -n "$expected_mode" ]; then
              actual_mode=$(jq -r '.mode // ""' /tmp/scheduled.json)
              if [ "$actual_mode" != "$expected_mode" ]; then
                echo "Expected ${fn} mode=${expected_mode}, got ${actual_mode}" >&2
                exit 1
              fi
            fi
          }

          check_internal_function "notifications-enqueue-v2" '{}'
          check_internal_function "notifications-dispatch-v2" '{}' 'send'
          check_internal_function "retry-missing-pep-talk-transcripts" '{"mode":"scheduled","limit":5}'
